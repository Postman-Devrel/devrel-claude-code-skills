<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Pipeline — Postman DevRel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="top-bar">
        <div class="top-bar-left">
            <svg class="logo" width="28" height="28" viewBox="0 0 256 256" fill="none">
                <circle cx="128" cy="128" r="128" fill="#FF6C37"/>
                <path d="M187.5 116.5c.7-.7.7-1.8 0-2.5l-56.1-56.1c-.7-.7-1.8-.7-2.5 0l-56.1 56.1c-.7.7-.7 1.8 0 2.5l56.1 56.1c.7.7 1.8.7 2.5 0l56.1-56.1z" fill="#fff" fill-opacity=".6"/>
                <path d="M130.6 59.2c-.5-.5-1.2-.8-1.9-.8-.7 0-1.4.3-1.9.8L71.7 114.3c-1 1-1 2.7 0 3.7l55.1 55.1c.5.5 1.2.8 1.9.8.7 0 1.4-.3 1.9-.8l55.1-55.1c1-1 1-2.7 0-3.7l-55.1-55.1zm-3.2 99.9L82.7 114.3l44.7-44.7 1.3 1.3-43.4 43.4c-.4.4-.4 1 0 1.4l43.4 43.4-1.3 1.3v-.3zm3.8 0l-1.3-1.3 43.4-43.4c.4-.4.4-1 0-1.4l-43.4-43.4 1.3-1.3 44.7 44.7-44.7 44.7v-.6z" fill="#fff"/>
            </svg>
            <h1>Blog Pipeline</h1>
            <nav class="top-nav">
                <a href="/" class="nav-link {% if request.path == '/' %}nav-active{% endif %}">Board</a>
                <a href="/published" class="nav-link {% if request.path == '/published' %}nav-active{% endif %}">Published</a>
                <a href="/admin" class="nav-link {% if request.path == '/admin' %}nav-active{% endif %}">Admin</a>
            </nav>
        </div>
        <div class="top-bar-right">
            <button class="btn btn-ghost" title="Refresh board" onclick="location.reload()">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.418A6 6 0 1 1 8 2v1z"/>
                    <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
                </svg>
                Refresh
            </button>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        // Poll /api/board-hash and reload only when card states change.
        // Poll more aggressively when cards are actively in-progress.
        let _lastHash = null;
        async function pollBoard() {
            try {
                const r = await fetch('/api/board-hash');
                if (!r.ok) return;
                const { hash } = await r.json();
                if (_lastHash === null) { _lastHash = hash; return; }
                if (hash !== _lastHash) { location.reload(); }
            } catch (e) {}
        }
        const hasActive = !!document.querySelector('.pulse');
        setInterval(pollBoard, hasActive ? 4000 : 15000);
    </script>
</body>
</html>
